<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌌 Cosmic Cat Chatbot</title>
  <!-- โหลดฟอนต์น่ารักๆ จาก Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Mali:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-gradient: radial-gradient(circle at 50% 10%, #1a0b36 0%, #080214 70%, #020008 100%);
      --glass-bg: rgba(20, 10, 38, 0.65);
      --glass-border: rgba(168, 85, 247, 0.3);
      --user-gradient: linear-gradient(135deg, #00d2ff 0%, #0052d4 100%);
      --bot-gradient: linear-gradient(135deg, #2b1055 0%, #7597de 100%);
      --neon-purple: #c084fc;
      --neon-cyan: #38edf8;
      --text-light: #f3e8ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Kanit', sans-serif;
    }

    body {
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
      overflow: hidden;
      color: var(--text-light);
    }

    /* พื้นหลังดวงดาวเรืองแสง */
    body::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 40px 70px, var(--neon-cyan), rgba(0,0,0,0)),
        radial-gradient(3px 3px at 90px 40px, var(--neon-purple), rgba(0,0,0,0)),
        radial-gradient(2px 2px at 160px 120px, #fff, rgba(0,0,0,0));
      background-repeat: repeat;
      background-size: 200px 200px;
      opacity: 0.4;
      animation: starsMove 100s linear infinite;
      z-index: 0;
    }

    @keyframes starsMove {
      from { background-position: 0 0; }
      to { background-position: 1000px 1000px; }
    }

    /* Container หลัก หรูหรา สะดุดตา */
    .chat-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 550px;
      height: 88vh;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.25), inset 0 0 15px rgba(56, 237, 248, 0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header & หน้าบอทแมว */
    .header {
      padding: 18px 20px;
      background: rgba(10, 4, 22, 0.6);
      border-bottom: 1px solid var(--glass-border);
      text-align: center;
    }

    .cat-avatar-container {
      position: relative;
      width: 70px;
      height: 70px;
      margin: 0 auto 8px auto;
    }

    .cat-avatar {
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #1f0938, #3b136f);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 38px;
      border: 2px solid var(--neon-cyan);
      box-shadow: 0 0 15px var(--neon-cyan), inset 0 0 10px var(--neon-purple);
      animation: floatCat 3s ease-in-out infinite;
    }

    @keyframes floatCat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-6px) rotate(3deg); }
    }

    .header h2 {
      font-family: 'Mali', cursive;
      font-size: 1.3rem;
      background: linear-gradient(to right, var(--neon-cyan), var(--neon-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 10px rgba(192, 132, 252, 0.3);
    }

    .warning-text {
      font-size: 0.75rem;
      color: #fb7185;
      margin-top: 4px;
      opacity: 0.9;
    }

    .api-key-box {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }

    .api-key-box input {
      flex: 1;
      padding: 8px 14px;
      background: rgba(5, 2, 12, 0.7);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--neon-cyan);
      font-size: 0.85rem;
      outline: none;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
    }

    .api-key-box button {
      padding: 8px 16px;
      background: linear-gradient(135deg, #a855f7, #6366f1);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: 0 0 10px rgba(168, 85, 247, 0.4);
      transition: all 0.2s;
    }

    .api-key-box button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.7);
    }

    /* ช่องสนทนา */
    .chat-box {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .chat-box::-webkit-scrollbar {
      width: 6px;
    }
    .chat-box::-webkit-scrollbar-thumb {
      background: rgba(168, 85, 247, 0.3);
      border-radius: 10px;
    }

    .message-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.bot {
      justify-content: flex-start;
    }

    .mini-cat-icon {
      font-size: 22px;
      filter: drop-shadow(0 0 5px var(--neon-purple));
    }

    /* ฟองข้อความ นูนเรืองแสง ไล่สี */
    .message {
      max-width: 75%;
      padding: 12px 18px;
      border-radius: 20px;
      font-size: 0.95rem;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
      position: relative;
    }

    .user-message {
      background: var(--user-gradient);
      color: #ffffff;
      border-bottom-right-radius: 4px;
      /* ความนูนและเงาเรืองแสง */
      box-shadow: 
        0 4px 15px rgba(0, 210, 255, 0.3),
        inset 0 2px 3px rgba(255, 255, 255, 0.4),
        inset 0 -2px 5px rgba(0, 0, 0, 0.2);
    }

    .bot-message {
      background: var(--bot-gradient);
      color: #f3e8ff;
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(192, 132, 252, 0.2);
      /* ความนูนและเงาเรืองแสง */
      box-shadow: 
        0 4px 15px rgba(168, 85, 247, 0.25),
        inset 0 2px 3px rgba(255, 255, 255, 0.2),
        inset 0 -2px 5px rgba(0, 0, 0, 0.4);
    }

    .typing-indicator {
      display: none;
      align-self: flex-start;
      margin-left: 35px;
      font-family: 'Mali', cursive;
      font-size: 0.85rem;
      color: var(--neon-cyan);
      text-shadow: 0 0 8px var(--neon-cyan);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* ช่องพิมพ์ข้อความด้านล่าง */
    .input-area {
      padding: 15px 20px;
      background: rgba(10, 4, 22, 0.7);
      border-top: 1px solid var(--glass-border);
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 12px 18px;
      background: rgba(5, 2, 12, 0.8);
      border: 1px solid rgba(168, 85, 247, 0.4);
      border-radius: 25px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.6);
      transition: all 0.3s;
    }

    .input-area input:focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 10px rgba(56, 237, 248, 0.3), inset 0 2px 5px rgba(0,0,0,0.6);
    }

    .input-area button {
      padding: 12px 22px;
      background: linear-gradient(135deg, var(--neon-cyan), #0052d4);
      color: #030008;
      font-weight: 700;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(56, 237, 248, 0.5);
      transition: all 0.2s;
    }

    .input-area button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 18px rgba(56, 237, 248, 0.8);
    }
  </style>
</head>
<body>

  <div class="chat-card">
    <!-- Header -->
    <div class="header">
      <div class="cat-avatar-container">
        <div class="cat-avatar">🐱✨</div>
      </div>
      <h2>Cosmic Cat Chatbot</h2>
      <p class="warning-text">⚠️ เว็บไซต์นี้เป็นเว็บฝึกหัด กรุณาใช้ Gemini API Key ของคุณเองเท่านั้น</p>
      
      <div class="api-key-box">
        <input type="password" id="apiKeyInput" placeholder="วาง Gemini API Key ตรงนี้เลยทาส...">
        <button onclick="saveApiKey()">บันทึก Key</button>
      </div>
    </div>

    <!-- Chat Messages Area -->
    <div class="chat-box" id="chatBox">
      <div class="message-row bot">
        <div class="mini-cat-icon">🐾</div>
        <div class="message bot-message">เหมียววว! ยินดีต้อนรับสู่จักรวาลแมว มีอะไรจะถามเหมียวไหมทาส? ตอบตรง ตอบชัวร์ แต่กวนนิดนึงนะ เหมียว! 🌌🐱</div>
      </div>
    </div>

    <!-- Typing Indicator -->
    <div class="typing-indicator" id="typingIndicator">🐾 เหมียวกำลังพิมพ์ข้อความ...</div>

    <!-- Input Area -->
    <div class="input-area">
      <input type="text" id="userInput" placeholder="พิมพ์ข้อความคุยกับน้องแมว..." onkeydown="handleKeyPress(event)">
      <button onclick="sendMessage()">ส่ง 🚀</button>
    </div>
  </div>

  <script>
    // System Prompt กำหนดบุคลิกบอทแมวจักรวาล
    const SYSTEM_PROMPT = "คุณคือแชตบอตแมวจักรวาลสุดคิวต์ที่มีบุคลิกกวนๆ น่ารัก เป็นกันเอง มักจะแทนตัวเองว่า 'เหมียว' หรือ 'พี่แมว' และเรียกผู้ใช้ว่า 'ทาส' พูดจาสนุกสนาน แต่เมื่อตอบคำถามต้องให้ข้อมูลที่ถูกต้อง ชัดเจน ตรงประเด็น และแม่นยำเสมอ ห้ามมั่วเด็ดขาด";

    // ประวัติการสนทนาทั้งหมด (สำหรับส่งบริบทกลับไปทุกครั้ง)
    let chatHistory = [];

    // โหลด API Key จาก localStorage เมื่อเปิดหน้าเว็บ
    window.onload = () => {
      const savedKey = localStorage.getItem('gemini_api_key');
      if (savedKey) {
        document.getElementById('apiKeyInput').value = savedKey;
      }
    };

    function saveApiKey() {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (key) {
        localStorage.setItem('gemini_api_key', key);
        alert('บันทึก API Key เรียบร้อยแล้วเหมียว!');
      } else {
        localStorage.removeItem('gemini_api_key');
        alert('ลบ API Key เรียบร้อยแล้วเหมียว!');
      }
    }

    function appendMessage(text, sender) {
      const chatBox = document.getElementById('chatBox');
      
      const rowDiv = document.createElement('div');
      rowDiv.classList.add('message-row', sender);

      if (sender === 'bot') {
        const iconDiv = document.createElement('div');
        iconDiv.classList.add('mini-cat-icon');
        iconDiv.textContent = '🐾';
        rowDiv.appendChild(iconDiv);
      }

      const msgDiv = document.createElement('div');
      msgDiv.classList.add('message', sender === 'user' ? 'user-message' : 'bot-message');
      msgDiv.textContent = text;
      
      rowDiv.appendChild(msgDiv);
      chatBox.appendChild(rowDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    }

    async function sendMessage() {
      const apiKey = localStorage.getItem('gemini_api_key');
      if (!apiKey) {
        alert('กรุณากรอกและบันทึก Gemini API Key ก่อนใช้งานนะทาส!');
        return;
      }

      const inputField = document.getElementById('userInput');
      const userText = inputField.value.trim();
      if (!userText) return;

      // แสดงข้อความฝั่งผู้ใช้ (ชิดขวา)
      appendMessage(userText, 'user');
      inputField.value = '';

      // เพิ่มคำถามผู้ใช้ลงในประวัติ
      chatHistory.push({
        role: 'user',
        parts: [{ text: userText }]
      });

      // แสดงสถานะกำลังพิมพ์
      const typingIndicator = document.getElementById('typingIndicator');
      typingIndicator.style.display = 'block';

      try {
        // เรียก API โมเดล gemini-flash-latest พร้อมส่ง key ผ่าน Header
        const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-goog-api-key': apiKey
          },
          body: JSON.stringify({
            systemInstruction: {
              parts: [{ text: SYSTEM_PROMPT }]
            },
            contents: chatHistory // ส่งประวัติทั้งหมดกลับไปเพื่อให้เก็บบริบทได้
          })
        });

        const data = await response.json();
        typingIndicator.style.display = 'none';

        if (response.ok && data.candidates && data.candidates[0].content.parts[0].text) {
          const botReply = data.candidates[0].content.parts[0].text;
          
          // แสดงข้อความบอท (ชิดซ้าย)
          appendMessage(botReply, 'bot');

          // บันทึกคำตอบบอทลงประวัติการสนทนา
          chatHistory.push({
            role: 'model',
            parts: [{ text: botReply }]
          });
        } else {
          const errorMsg = data.error?.message || 'เกิดข้อผิดพลาดในการดึงข้อมูล';
          appendMessage(`❌ Error: ${errorMsg}`, 'bot');
        }

      } catch (error) {
        typingIndicator.style.display = 'none';
        appendMessage(`❌ ไม่สามารถเชื่อมต่อได้: ${error.message}`, 'bot');
      }
    }
  </script>
</body>
</html>
